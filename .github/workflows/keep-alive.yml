name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 */3 * *'  # 3일마다 오전 9시 실행
  workflow_dispatch:        # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://oitrivgffkdhkedhydqw.supabase.co/rest/v1/announcements?select=id&limit=1" \
            -H "apikey: sb_publishable_4PqLCIH-jrX0AsF9ws4fIA_EKIRO4d8" \
            -H "Authorization: Bearer sb_publishable_4PqLCIH-jrX0AsF9ws4fIA_EKIRO4d8"
          echo " - Supabase pinged"
